<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OAuth Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #08080f;
      --surface: #111118;
      --card: #16161f;
      --border: #2a2a3a;
      --accent: #7c6aff;
      --accent2: #ff6a88;
      --text: #f0f0ff;
      --muted: #7070a0;
      --google: #ffffff;
      --github: #24292e;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated background */
    .bg-orbs {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      animation: float 8s ease-in-out infinite;
    }
    .orb-1 { width: 500px; height: 500px; background: var(--accent); top: -150px; left: -150px; animation-delay: 0s; }
    .orb-2 { width: 400px; height: 400px; background: var(--accent2); bottom: -100px; right: -100px; animation-delay: 3s; }
    .orb-3 { width: 300px; height: 300px; background: #4adeee; top: 50%; left: 60%; animation-delay: 6s; }

    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-30px) scale(1.05); }
    }

    /* Grid pattern */
    .grid-pattern {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(124, 106, 255, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124, 106, 255, 0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      z-index: 0;
    }

    /* Card */
    .card {
      position: relative;
      z-index: 10;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 44px;
      width: 100%;
      max-width: 440px;
      margin: 16px;
      box-shadow: 0 40px 100px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04);
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
      transform: translateY(30px);
    }
    @keyframes slideUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Logo */
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 36px;
    }
    .logo-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    .logo-text {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 22px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Heading */
    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
      line-height: 1.2;
    }
    .subtitle {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.5;
      margin-bottom: 36px;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 28px 0;
      color: var(--muted);
      font-size: 13px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* OAuth Buttons */
    .oauth-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 14px 20px;
      border-radius: 14px;
      border: 1px solid var(--border);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s ease;
      margin-bottom: 12px;
      position: relative;
      overflow: hidden;
    }
    .oauth-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .oauth-btn:hover::before { opacity: 1; }
    .oauth-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,0.3); }
    .oauth-btn:active { transform: translateY(0); }

    .google-btn {
      background: #fff;
      color: #1f1f1f;
      border-color: #e0e0e0;
    }
    .google-btn::before { background: rgba(0,0,0,0.05); }
    .google-btn:hover { border-color: #ccc; }

    .github-btn {
      background: #24292e;
      color: #ffffff;
      border-color: #444;
    }
    .github-btn::before { background: rgba(255,255,255,0.06); }
    .github-btn:hover { border-color: #666; }

    .btn-icon {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
    }

    /* Features */
    .features {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }
    .feature {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--muted);
    }
    .feature-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }

    /* Error message */
    .error-msg {
      background: rgba(255, 80, 80, 0.1);
      border: 1px solid rgba(255, 80, 80, 0.3);
      border-radius: 10px;
      padding: 12px 16px;
      color: #ff7070;
      font-size: 14px;
      margin-bottom: 20px;
      display: none;
    }
    .error-msg.show { display: block; }

    /* Responsive */
    @media (max-width: 480px) {
      .card { padding: 36px 28px; }
      h1 { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>
  <div class="grid-pattern"></div>

  <div class="card">
    <div class="logo">
      <div class="logo-icon">🔐</div>
      <span class="logo-text">AuthFlow</span>
    </div>

    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to your account using your preferred provider. No password needed.</p>

    <!-- Error Message -->
    <div class="error-msg" id="errorMsg"></div>

    <!-- Google Login -->
    <a href="/auth/google" class="oauth-btn google-btn">
      <svg class="btn-icon" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M23.745 12.27c0-.79-.07-1.54-.19-2.27h-11.3v4.51h6.47c-.29 1.48-1.14 2.73-2.4 3.58v3h3.86c2.26-2.09 3.56-5.17 3.56-8.82z"/>
        <path fill="#34A853" d="M12.255 24c3.24 0 5.95-1.08 7.93-2.91l-3.86-3c-1.08.72-2.45 1.16-4.07 1.16-3.13 0-5.78-2.11-6.73-4.96h-3.98v3.09C3.515 21.3 7.615 24 12.255 24z"/>
        <path fill="#FBBC05" d="M5.525 14.29c-.25-.72-.38-1.49-.38-2.29s.14-1.57.38-2.29V6.62h-3.98a11.86 11.86 0 000 10.76l3.98-3.09z"/>
        <path fill="#EA4335" d="M12.255 4.75c1.77 0 3.35.61 4.6 1.8l3.42-3.42C18.205 1.19 15.495 0 12.255 0c-4.64 0-8.74 2.7-10.71 6.62l3.98 3.09c.95-2.85 3.6-4.96 6.73-4.96z"/>
      </svg>
      Continue with Google
    </a>

    <!-- GitHub Login -->
    <a href="/auth/github" class="oauth-btn github-btn">
      <svg class="btn-icon" viewBox="0 0 24 24" fill="white">
        <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
      </svg>
      Continue with GitHub
    </a>

    <div class="features">
      <div class="feature">
        <div class="feature-dot"></div>
        <span>No password required — login with one click</span>
      </div>
      <div class="feature">
        <div class="feature-dot" style="background: var(--accent2)"></div>
        <span>Your data is encrypted and secure</span>
      </div>
      <div class="feature">
        <div class="feature-dot" style="background: #4adeee"></div>
        <span>Sessions last 7 days automatically</span>
      </div>
    </div>
  </div>

  <script>
    // Show error from URL params
    const params = new URLSearchParams(window.location.search);
    const error = params.get('error');
    if (error) {
      const msg = document.getElementById('errorMsg');
      msg.textContent = error === 'google_failed'
        ? '❌ Google login failed. Please try again.'
        : error === 'github_failed'
        ? '❌ GitHub login failed. Please try again.'
        : '❌ Login failed. Please try again.';
      msg.classList.add('show');
    }
  </script>
</body>
</html>
