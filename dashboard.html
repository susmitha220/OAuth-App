<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — AuthFlow</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #08080f;
      --surface: #111118;
      --card: #16161f;
      --border: #2a2a3a;
      --accent: #7c6aff;
      --accent2: #ff6a88;
      --text: #f0f0ff;
      --muted: #7070a0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .bg-orbs { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .orb { position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.12; animation: float 10s ease-in-out infinite; }
    .orb-1 { width: 600px; height: 600px; background: var(--accent); top: -200px; right: -100px; }
    .orb-2 { width: 400px; height: 400px; background: var(--accent2); bottom: 0; left: -100px; animation-delay: 4s; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-20px)} }

    .grid-pattern {
      position: fixed; inset: 0; z-index: 0;
      background-image: linear-gradient(rgba(124,106,255,0.03) 1px,transparent 1px), linear-gradient(90deg,rgba(124,106,255,0.03) 1px,transparent 1px);
      background-size: 60px 60px;
    }

    /* Navbar */
    nav {
      position: relative; z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 40px;
      border-bottom: 1px solid var(--border);
      background: rgba(8,8,15,0.8);
      backdrop-filter: blur(20px);
    }
    .nav-logo {
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .nav-right { display: flex; align-items: center; gap: 16px; }
    .user-avatar {
      width: 38px; height: 38px; border-radius: 50%;
      border: 2px solid var(--accent); object-fit: cover;
    }
    .user-avatar-placeholder {
      width: 38px; height: 38px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 16px; color: white;
    }
    .logout-btn {
      padding: 8px 18px; border-radius: 10px; border: 1px solid var(--border);
      background: transparent; color: var(--muted); font-size: 14px;
      cursor: pointer; transition: all 0.2s; font-family: 'DM Sans', sans-serif;
      text-decoration: none;
    }
    .logout-btn:hover { border-color: var(--accent2); color: var(--accent2); }

    /* Main */
    main {
      position: relative; z-index: 10;
      max-width: 900px; margin: 0 auto;
      padding: 48px 24px;
      animation: fadeIn 0.5s ease forwards;
    }
    @keyframes fadeIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

    .welcome-text {
      font-family: 'Syne', sans-serif; font-size: 36px; font-weight: 700;
      margin-bottom: 6px;
    }
    .welcome-sub { color: var(--muted); font-size: 16px; margin-bottom: 40px; }

    /* Stats */
    .stats-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; padding: 24px;
      transition: transform 0.2s, border-color 0.2s;
    }
    .stat-card:hover { transform: translateY(-3px); border-color: var(--accent); }
    .stat-label { color: var(--muted); font-size: 13px; margin-bottom: 8px; }
    .stat-value { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; }
    .stat-icon { font-size: 28px; margin-bottom: 12px; }

    /* Profile Card */
    .profile-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 20px; padding: 32px; margin-bottom: 24px;
    }
    .profile-card h2 {
      font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700;
      margin-bottom: 24px; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.05em; font-size: 12px;
    }
    .profile-info { display: flex; align-items: center; gap: 24px; flex-wrap: wrap; }
    .profile-avatar {
      width: 80px; height: 80px; border-radius: 20px;
      border: 2px solid var(--accent); object-fit: cover;
    }
    .profile-avatar-placeholder {
      width: 80px; height: 80px; border-radius: 20px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; font-weight: 700; color: white;
    }
    .profile-details { flex: 1; }
    .profile-name { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 700; margin-bottom: 4px; }
    .profile-email { color: var(--muted); font-size: 15px; margin-bottom: 12px; }
    .provider-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 12px; border-radius: 20px; font-size: 13px; font-weight: 500;
    }
    .provider-google { background: rgba(66,133,244,0.15); color: #4285F4; border: 1px solid rgba(66,133,244,0.3); }
    .provider-github { background: rgba(255,255,255,0.08); color: #ccc; border: 1px solid rgba(255,255,255,0.15); }

    /* Fields */
    .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 24px; }
    .field { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px; }
    .field-label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
    .field-value { font-size: 15px; font-weight: 500; color: var(--text); word-break: break-all; }

    /* Loading */
    .loading { text-align: center; padding: 60px; color: var(--muted); font-size: 16px; }
    .spinner {
      width: 40px; height: 40px; border: 3px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 0 auto 16px;
    }
    @keyframes spin { to{transform:rotate(360deg)} }

    @media (max-width: 640px) {
      nav { padding: 16px 20px; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .field-grid { grid-template-columns: 1fr; }
      .welcome-text { font-size: 28px; }
    }
  </style>
</head>
<body>
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>
  <div class="grid-pattern"></div>

  <nav>
    <span class="nav-logo">🔐 AuthFlow</span>
    <div class="nav-right">
      <div id="navAvatar"></div>
      <a href="/auth/logout" class="logout-btn">Sign out</a>
    </div>
  </nav>

  <main id="mainContent">
    <div class="loading">
      <div class="spinner"></div>
      Loading your dashboard...
    </div>
  </main>

  <script>
    async function loadDashboard() {
      try {
        const res = await fetch('/auth/me', { credentials: 'include' });
        if (!res.ok) { window.location.href = '/'; return; }
        const { user } = await res.json();
        renderDashboard(user);
      } catch (e) {
        window.location.href = '/';
      }
    }

    function getInitial(name) {
      return (name || '?')[0].toUpperCase();
    }

    function renderDashboard(user) {
      // Nav avatar
      const navAv = document.getElementById('navAvatar');
      if (user.avatar) {
        navAv.innerHTML = `<img src="${user.avatar}" class="user-avatar" alt="avatar" onerror="this.style.display='none'" />`;
      } else {
        navAv.innerHTML = `<div class="user-avatar-placeholder">${getInitial(user.name)}</div>`;
      }

      const joinedDate = new Date(user.createdAt).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
      const lastLogin = new Date(user.lastLogin).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });

      const avatarHTML = user.avatar
        ? `<img src="${user.avatar}" class="profile-avatar" alt="avatar" onerror="this.outerHTML='<div class=profile-avatar-placeholder>${getInitial(user.name)}</div>'" />`
        : `<div class="profile-avatar-placeholder">${getInitial(user.name)}</div>`;

      const providerBadge = user.provider === 'google'
        ? `<span class="provider-badge provider-google">🔵 Google Account</span>`
        : `<span class="provider-badge provider-github">⚫ GitHub Account</span>`;

      document.getElementById('mainContent').innerHTML = `
        <div class="welcome-text">Hello, ${user.name.split(' ')[0]}! 👋</div>
        <p class="welcome-sub">You're successfully logged in via ${user.provider === 'google' ? 'Google' : 'GitHub'} OAuth.</p>

        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-icon">🔐</div>
            <div class="stat-label">Auth Provider</div>
            <div class="stat-value" style="text-transform:capitalize">${user.provider}</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">📅</div>
            <div class="stat-label">Member Since</div>
            <div class="stat-value" style="font-size:16px">${joinedDate}</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">⚡</div>
            <div class="stat-label">Last Login</div>
            <div class="stat-value" style="font-size:15px">${lastLogin}</div>
          </div>
        </div>

        <div class="profile-card">
          <h2>Your Profile</h2>
          <div class="profile-info">
            ${avatarHTML}
            <div class="profile-details">
              <div class="profile-name">${user.name}</div>
              <div class="profile-email">${user.email || 'No email provided'}</div>
              ${providerBadge}
            </div>
          </div>
          <div class="field-grid">
            <div class="field">
              <div class="field-label">User ID</div>
              <div class="field-value" style="font-size:12px;color:var(--muted)">${user.id}</div>
            </div>
            <div class="field">
              <div class="field-label">Email</div>
              <div class="field-value">${user.email || '—'}</div>
            </div>
         ${user.githubUsername ? `
<div class="field">
  <div class="field-label">GitHub Profile</div>
  <div class="field-value">
    <a href="https://github.com/susmitha220?tab=repositories"
       target="_blank"
       rel="noopener"
       style="color:#7c6aff;text-decoration:none;">
       Open My GitHub Repositories
    </a>
  </div>
</div>` : ''}
            <div class="field">
              <div class="field-label">Provider</div>
              <div class="field-value" style="text-transform:capitalize">${user.provider}</div>
            </div>
          </div>
        </div>
      `;
    }

    loadDashboard();
  </script>
</body>
</html>
